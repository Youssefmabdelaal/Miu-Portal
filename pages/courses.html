<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Smart University</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Smart University Course Registration System</h1>
        <nav>
            <a href="student-dashboard.html">Dashboard</a>
            <a href="login.html">Logout</a>
        </nav>
    </header>
    <main>
        <section class="courses-section">
            <h2>Available Courses</h2>
            <div id="course-limit-warning" class="alert-warning" style="display: none; padding: 10px; background-color: #fff3cd; border: 1px solid #ffeaa7; border-radius: 4px; margin-bottom: 15px; color: #856404;">
                <strong>⚠️ Course Limit:</strong> You have registered for <span id="registered-count">0</span>/5 courses. You cannot register for more than 5 courses at a time.
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search courses by name, code, or instructor..." class="search-input">
            </div>
            <div id="courses-list">
                <!-- Courses will be loaded here -->
            </div>
            <h2>My Registered Courses</h2>
            <div id="registered-courses">
                <!-- Registered courses will be loaded here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Smart University. All rights reserved.</p>
    </footer>
    <script src="../js/script.js"></script>
    <script src="../js/courses.js"></script>
</body>
</html>
