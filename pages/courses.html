<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Smart University</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Smart University Course Registration System</h1>
        <nav>
            <a href="student-dashboard.html">Dashboard</a>
            <a href="login.html">Logout</a>
        </nav>
    </header>
    <main>
        <section class="courses-section">
            <h2>Available Courses</h2>
            <div id="courses-list">
                <!-- Courses will be loaded here -->
                <div class="course-card">
                    <h3>Course Name</h3>
                    <p>Code: CS101</p>
                    <p>Instructor: Dr. Smith</p>
                    <p>Available Seats: 25</p>
                    <button class="btn add-course">Add Course</button>
                </div>
                <!-- More course cards -->
            </div>
            <h2>My Registered Courses</h2>
            <div id="registered-courses">
                <!-- Registered courses will be loaded here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Smart University. All rights reserved.</p>
    </footer>
    <script src="../js/script.js"></script>
</body>
</html>
