<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Smart University</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header>
        <h1>Smart University Course Registration System</h1>
        <nav>
            <a href="student-dashboard.html">Dashboard</a>
            <a href="courses.html">Courses</a>
            <a href="login.html">Logout</a>
        </nav>
    </header>
    <main>
        <section class="form-section">
            <h2>Edit Profile</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" readonly>
                </div>
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="Leave blank to keep current password">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Leave blank if not changing password">
                </div>
                <div id="formMessage" class="form-message"></div>
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Smart University. All rights reserved.</p>
    </footer>
    <script src="../js/profile.js"></script>
</body>
</html>
