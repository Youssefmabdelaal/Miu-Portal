<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — MIU Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/edureg-tailwind-config.js"></script>
    <link rel="stylesheet" href="../css/edureg-global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-background p-md font-body-md text-on-background antialiased md:p-lg">
    <main class="mx-auto w-full max-w-[480px] rounded-xl border border-outline-variant bg-surface-container-lowest p-lg shadow-md md:p-xl">
        <div class="mb-lg text-center">
            <span class="font-display text-2xl font-semibold text-primary">MIU Portal</span>
            <h1 class="mt-sm font-headline-md text-headline-md text-on-surface">Your profile</h1>
            <p class="mt-xs font-body-sm text-on-surface-variant">Update your name or password.</p>
        </div>
        <div class="mb-lg flex flex-col items-center gap-sm">
            <img id="profile-preview" alt="Profile" class="h-24 w-24 rounded-full border-2 border-outline-variant bg-primary-container object-cover p-sm" src="/images/default-avatar.svg" width="96" height="96">
            <label class="cursor-pointer font-label-md text-primary hover:underline">
                Upload new photo
                <input type="file" id="profileImage" name="profileImage" class="hidden" accept="image/png, image/jpeg">
            </label>
        </div>
        <form id="profileForm" class="flex flex-col gap-md">
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface" for="name">Full name</label>
                <input class="w-full rounded-lg border border-outline-variant bg-surface px-md py-sm font-body-md text-on-surface outline-none focus:border-primary focus:ring-1 focus:ring-primary" type="text" id="name" name="name" required autocomplete="name">
            </div>
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
                <input class="w-full cursor-not-allowed rounded-lg border border-outline-variant bg-surface-container-high px-md py-sm font-body-md text-on-surface-variant" type="email" id="email" name="email" readonly>
            </div>
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface" for="password">New password</label>
                <input class="w-full rounded-lg border border-outline-variant bg-surface px-md py-sm font-body-md outline-none focus:border-primary focus:ring-1 focus:ring-primary" type="password" id="password" name="password" placeholder="Leave blank to keep current" autocomplete="new-password">
            </div>
            <div class="flex flex-col gap-xs">
                <label class="font-label-md text-label-md text-on-surface" for="confirmPassword">Confirm new password</label>
                <input class="w-full rounded-lg border border-outline-variant bg-surface px-md py-sm font-body-md outline-none focus:border-primary focus:ring-1 focus:ring-primary" type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat new password" autocomplete="new-password">
            </div>
            <div id="formMessage" class="hidden rounded-lg border px-md py-sm font-body-sm"></div>
            <button type="submit" class="w-full rounded-lg bg-primary py-md font-label-md text-on-primary transition-colors hover:bg-primary-container">Save profile</button>
        </form>
        <div class="mt-lg flex justify-center gap-md border-t border-outline-variant pt-md font-body-sm">
            <a href="student-dashboard.html" class="text-primary hover:underline">Dashboard</a>
            <a href="courses.html" class="text-primary hover:underline">Courses</a>
            <a href="#" data-logout class="text-secondary hover:text-error">Log out</a>
        </div>
    </main>
    <script src="../js/api.js"></script>
    <script src="../js/profile.js"></script>
    <script src="../js/edureg-layout.js"></script>
</body>
</html>
